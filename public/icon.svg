<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#09090b"/>

  <!-- Tyre -->
  <circle cx="256" cy="256" r="228" fill="none" stroke="#27272a" stroke-width="36"/>

  <!-- Rim outer lip -->
  <circle cx="256" cy="256" r="208" fill="none" stroke="#3f3f46" stroke-width="6"/>

  <!-- Barrel ring -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="#dc2626" stroke-width="8"/>

  <!-- 5 spokes: from hub edge (r=58) to barrel (r=148) -->
  <line x1="256" y1="198" x2="256" y2="108" stroke="#dc2626" stroke-width="22" stroke-linecap="round" transform="rotate(0 256 256)"/>
  <line x1="256" y1="198" x2="256" y2="108" stroke="#dc2626" stroke-width="22" stroke-linecap="round" transform="rotate(72 256 256)"/>
  <line x1="256" y1="198" x2="256" y2="108" stroke="#dc2626" stroke-width="22" stroke-linecap="round" transform="rotate(144 256 256)"/>
  <line x1="256" y1="198" x2="256" y2="108" stroke="#dc2626" stroke-width="22" stroke-linecap="round" transform="rotate(216 256 256)"/>
  <line x1="256" y1="198" x2="256" y2="108" stroke="#dc2626" stroke-width="22" stroke-linecap="round" transform="rotate(288 256 256)"/>

  <!-- Lug nuts at spoke tips -->
  <circle cx="256" cy="108" r="14" fill="#dc2626" transform="rotate(0 256 256)"/>
  <circle cx="256" cy="108" r="14" fill="#dc2626" transform="rotate(72 256 256)"/>
  <circle cx="256" cy="108" r="14" fill="#dc2626" transform="rotate(144 256 256)"/>
  <circle cx="256" cy="108" r="14" fill="#dc2626" transform="rotate(216 256 256)"/>
  <circle cx="256" cy="108" r="14" fill="#dc2626" transform="rotate(288 256 256)"/>

  <!-- Hub cap -->
  <circle cx="256" cy="256" r="58" fill="#09090b" stroke="#dc2626" stroke-width="10"/>

  <!-- Centre bolt -->
  <circle cx="256" cy="256" r="22" fill="#dc2626"/>
  <circle cx="256" cy="256" r="10" fill="#09090b"/>
</svg>
